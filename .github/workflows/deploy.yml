name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  # Unit tests + static analysis — fast, independent.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install analysis tools
        run: sudo apt-get update && sudo apt-get install -y cppcheck clang-tools clang-tidy valgrind

      - name: Build and run tests (warnings are errors)
        run: |
          cmake -S . -B build-test -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS_ONLY=ON \
            -DCMAKE_C_FLAGS="-Werror"
          cmake --build build-test
          # world_t is ~600KB; tests that save+load use two on the stack (~1.2MB).
          # Default 8MB stack is tight with debug frames, so bump to 16MB.
          ulimit -s 16384
          ./build-test/space_miner_test

      - name: Build and run tests with AddressSanitizer
        run: |
          cmake -S . -B build-san -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS_ONLY=ON \
            -DCMAKE_C_FLAGS="-fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address"
          cmake --build build-san
          ulimit -s 16384
          ./build-san/space_miner_test

      - name: cppcheck static analysis
        run: |
          cppcheck --enable=warning,performance,portability \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --suppress='*:src/pl_mpeg.h' \
            --suppress='*:src/minimp3.h' \
            --suppress='*:src/stb_image.h' \
            -I shared/ -I src/ -I server/ \
            src/*.c server/game_sim.c server/sim_nav.c server/sim_autopilot.c server/sim_ai.c server/sim_save.c 2>&1

      - name: Clang static analyzer (scan-build)
        run: |
          cmake -S . -B build-scan -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS_ONLY=ON
          scan-build --status-bugs cmake --build build-scan

      - name: clang-tidy (bugprone + performance checks)
        run: |
          cmake -S . -B build-tidy -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS_ONLY=ON \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          clang-tidy -p build-tidy \
            server/game_sim.c server/sim_nav.c server/sim_autopilot.c \
            server/sim_ai.c server/sim_save.c server/sim_construction.c \
            2>&1 | tee clang-tidy-output.txt
          # Fail on bugprone errors only (warnings are informational)
          if grep -q "error:" clang-tidy-output.txt; then exit 1; fi

      - name: Valgrind memcheck (tests under memory checker)
        run: |
          cmake -S . -B build-valgrind -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS_ONLY=ON
          cmake --build build-valgrind
          ulimit -s 16384
          valgrind --error-exitcode=1 \
            --leak-check=full \
            --show-leak-kinds=definite \
            --errors-for-leak-kinds=definite \
            --track-origins=yes \
            --main-stacksize=16777216 \
            ./build-valgrind/space_miner_test 2>&1 | tail -30

  # Build client and server in parallel, deploy together atomically.
  # Both must succeed or neither goes live — prevents protocol desync.
  build-client:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 5.0.4

      - name: Build WASM
        run: |
          GIT_HASH=$(git rev-parse --short HEAD)
          emcmake cmake -S . -B build-web -DCMAKE_BUILD_TYPE=Release -DGIT_HASH=$GIT_HASH
          cmake --build build-web

      - name: Prepare artifacts
        run: |
          mkdir -p _site/play _site/music _site/ost _site/docs
          cp web/index.html _site/index.html
          cp web/play.html _site/play/index.html
          cp web/music.html _site/music/index.html
          cp web/music.html _site/ost/index.html
          cp build-web/space_miner.js _site/play/space_miner.js
          cp build-web/space_miner.wasm _site/play/space_miner.wasm
          cp docs/*.svg _site/docs/ 2>/dev/null || true
          sed -i 's|<head>|<head><script>window.SIGNAL_SERVER="wss://signal-ws.ratimics.com/ws";</script>|' _site/play/index.html

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-site
          path: _site/

  build-server:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.vars.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::022118847419:role/github-actions-deploy
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute short hash
        id: vars
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          platforms: linux/arm64
          push: true
          tags: 022118847419.dkr.ecr.us-east-1.amazonaws.com/signal-relay:${{ steps.vars.outputs.short_sha }}
          build-args: GIT_HASH=${{ steps.vars.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Gate: both builds must pass, then deploy + smoke test atomically.
  deploy:
    runs-on: ubuntu-latest
    needs: [build-client, build-server]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::022118847419:role/github-actions-deploy
          aws-region: us-east-1

      - name: Download client artifact
        uses: actions/download-artifact@v4
        with:
          name: client-site
          path: _site/

      # --- Snapshot current state for rollback ---
      - name: Snapshot current client
        id: snapshot-client
        continue-on-error: true
        run: |
          aws s3 sync s3://signal-ratimics-client/ /tmp/rollback-client/ --quiet
          echo "has_snapshot=true" >> "$GITHUB_OUTPUT"

      - name: Snapshot current server task definition
        id: snapshot-server
        run: |
          CURRENT_TASK_DEF=$(aws ecs describe-services \
            --cluster default \
            --services signal-relay \
            --query 'services[0].taskDefinition' \
            --output text)
          echo "task_def_arn=$CURRENT_TASK_DEF" >> "$GITHUB_OUTPUT"

      # --- Deploy both ---
      - name: Deploy client to S3
        run: aws s3 sync _site/ s3://signal-ratimics-client/ --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id E32W3RMW5O86FJ --paths "/*"

      - name: Deploy server to ECS
        run: |
          set -euo pipefail
          IMAGE_REPO=022118847419.dkr.ecr.us-east-1.amazonaws.com/signal-relay
          IMAGE_TAG=${{ needs.build-server.outputs.image_tag }}
          ARM64_DIGEST=$(
            aws ecr batch-get-image \
              --repository-name signal-relay \
              --image-ids imageTag=$IMAGE_TAG \
              --accepted-media-types application/vnd.oci.image.index.v1+json \
              --query 'images[0].imageManifest' \
              --output text |
            jq -r '.manifests[] | select(.platform.architecture == "arm64" and .platform.os == "linux") | .digest'
          )
          aws ecs describe-task-definition \
            --task-definition signal-relay-server \
            --query 'taskDefinition' > taskdef.json
          jq --arg image "${IMAGE_REPO}@${ARM64_DIGEST}" '
            .containerDefinitions[0].image = $image |
            del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
          ' taskdef.json > taskdef-deploy.json
          TASK_DEF_ARN=$(
            aws ecs register-task-definition \
              --cli-input-json file://taskdef-deploy.json \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text
          )
          aws ecs update-service \
            --cluster default \
            --service signal-relay \
            --task-definition "$TASK_DEF_ARN"

      - name: Wait for ECS stabilization
        run: |
          echo "Waiting for new server task to be running..."
          aws ecs wait services-stable --cluster default --services signal-relay

      - name: Wait for CDN propagation
        run: sleep 60

      # --- Smoke test: validates client + server together ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install test dependencies
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: Smoke test (client + server coherence)
        id: smoke
        continue-on-error: true
        run: SMOKE_URL=https://signal.ratimics.com/play/ npx playwright test

      - name: Upload smoke results
        if: steps.smoke.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/

      # --- Rollback BOTH on failure ---
      - name: Rollback client
        if: steps.smoke.outcome == 'failure' && steps.snapshot-client.outputs.has_snapshot == 'true'
        run: |
          echo "::error::Smoke tests failed — rolling back client"
          aws s3 sync /tmp/rollback-client/ s3://signal-ratimics-client/ --delete
          aws cloudfront create-invalidation --distribution-id E32W3RMW5O86FJ --paths "/*"

      - name: Rollback server
        if: steps.smoke.outcome == 'failure'
        run: |
          echo "::error::Smoke tests failed — rolling back server to previous task definition"
          aws ecs update-service \
            --cluster default \
            --service signal-relay \
            --task-definition "${{ steps.snapshot-server.outputs.task_def_arn }}"

      - name: Fail if smoke tests failed
        if: steps.smoke.outcome == 'failure'
        run: exit 1

  native:
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
          - os: macos-latest
            name: macos
          - os: windows-latest
            name: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.name == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libgl-dev libx11-dev libxi-dev libxcursor-dev libasound2-dev

      - name: Build
        shell: bash
        run: |
          GIT_HASH=$(git rev-parse --short HEAD)
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DGIT_HASH=$GIT_HASH
          cmake --build build --config Release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signal-${{ matrix.name }}
          path: build/
